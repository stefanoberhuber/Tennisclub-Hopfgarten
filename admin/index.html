<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Admin Produkte</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>

body{
font-family:Arial;
margin:0;
background:#f4f4f4;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

h1{
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button{
padding:12px 18px;
border:none;
border-radius:8px;
background:#007bff;
color:white;
font-size:16px;
cursor:pointer;
}

button.secondary{
background:#555;
}

button.danger{
background:#d33;
}

input{
padding:10px;
border-radius:6px;
border:1px solid #ccc;
font-size:16px;
width:100%;
box-sizing:border-box;
}

table{
width:100%;
border-collapse:collapse;
margin-top:10px;
}

th,td{
padding:10px;
border-bottom:1px solid #ddd;
text-align:left;
}

.modal-backdrop{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
background:rgba(0,0,0,0.5);
display:none;
align-items:center;
justify-content:center;
}

.modal{
background:white;
padding:25px;
border-radius:10px;
width:90%;
max-width:450px;
}

.modal h2{
margin-top:0;
}

.modal-buttons{
margin-top:20px;
display:flex;
gap:10px;
justify-content:flex-end;
}

.confirm-box{
position:fixed;
bottom:30px;
right:30px;
background:#28a745;
color:white;
padding:15px 20px;
border-radius:8px;
display:none;
}

@media (max-width:900px){

.grid{
grid-template-columns:1fr;
}

button{
font-size:18px;
padding:14px;
}

}

</style>
</head>

<body>

<div class="container">

<h1>Admin Bereich</h1>

<div class="grid">

<!-- Mitglieder -->

<div class="card">

<h2>Mitglieder</h2>

<input id="searchMember" placeholder="Name suchen...">

<table>
<thead>
<tr>
<th>Name</th>
<th>Aktion</th>
</tr>
</thead>
<tbody id="memberList"></tbody>
</table>

</div>


<!-- Produkt Statistik -->

<div class="card">

<h2>Produkt Statistik</h2>

<div style="display:flex;gap:10px;margin-bottom:10px;">
<input type="date" id="fromDate">
<input type="date" id="toDate">
<button onclick="loadStats()">Filtern</button>
</div>

<table>
<thead>
<tr>
<th>Produkt</th>
<th>Anzahl</th>
<th>Umsatz</th>
</tr>
</thead>
<tbody id="statsList"></tbody>
</table>

<h3 id="totalRevenue">Umsatz gesamt: 0€</h3>

</div>

</div>

</div>

<!-- Modal -->

<div id="modalBackdrop" class="modal-backdrop">

<div class="modal" id="modal">

<h2>Mitglied bearbeiten</h2>

<input id="memberName">

<div class="modal-buttons">
<button class="secondary" onclick="closeModal()">Abbrechen</button>
<button onclick="saveMember()">Speichern</button>
</div>

</div>
</div>


<div id="confirmBox" class="confirm-box">
Gespeichert
</div>

<script>

const supabase = window.supabase.createClient(
"SUPABASE_URL",
"SUPABASE_ANON_KEY"
)

let currentMemberId=null

// Modal schließen bei Escape

document.addEventListener("keydown",(e)=>{
if(e.key==="Escape") closeModal()
})

// Modal schließen bei Klick außerhalb

document.getElementById("modalBackdrop").addEventListener("click",(e)=>{
if(e.target.id==="modalBackdrop") closeModal()
})

function openModal(){

document.getElementById("modalBackdrop").style.display="flex"

}

function closeModal(){

document.getElementById("modalBackdrop").style.display="none"

}

// Confirm Box

function showConfirm(){

const box=document.getElementById("confirmBox")

box.style.display="block"

setTimeout(()=>{
box.style.display="none"
},2000)

}

// Mitglieder laden

async function loadMembers(){

let search=document.getElementById("searchMember").value

let query=supabase.from("members").select("*")

if(search){

query=query.ilike("name","%"+search+"%")

}

let {data}=await query

let list=document.getElementById("memberList")

list.innerHTML=""

data.forEach(m=>{

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${m.name}</td>
<td>
<button onclick="editMember('${m.id}','${m.name}')">Bearbeiten</button>
</td>
`

list.appendChild(tr)

})

}

// Bearbeiten

function editMember(id,name){

currentMemberId=id

document.getElementById("memberName").value=name

openModal()

}

// Speichern

async function saveMember(){

let name=document.getElementById("memberName").value

await supabase
.from("members")
.update({name})
.eq("id",currentMemberId)

closeModal()

showConfirm()

loadMembers()

}

// Statistik laden

async function loadStats(){

let from=document.getElementById("fromDate").value
let to=document.getElementById("toDate").value

let query=supabase.from("sales_view").select("*")

if(from) query=query.gte("date",from)
if(to) query=query.lte("date",to)

let {data}=await query

let list=document.getElementById("statsList")

list.innerHTML=""

let total=0

data.forEach(p=>{

total+=p.revenue

let tr=document.createElement("tr")

tr.innerHTML=`
<td>${p.product}</td>
<td>${p.amount}</td>
<td>${p.revenue} €</td>
`

list.appendChild(tr)

})

document.getElementById("totalRevenue").innerText="Umsatz gesamt: "+total+" €"

}

// Suche Listener

document.getElementById("searchMember").addEventListener("input",loadMembers)

// Start

loadMembers()
loadStats()

</script>

</body>
</html>
