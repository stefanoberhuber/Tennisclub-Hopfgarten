
<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Tennisclub Admin</title>

<style>

body{
font-family:Arial, sans-serif;
background:#f4f6f8;
margin:0;
padding:25px;
font-size:17px;
}

h1{
margin-bottom:25px;
color:#1D1D1B;
font-size:26px;
}

.admin-buttons{
display:grid;
grid-template-columns:repeat(3,1fr);
gap:15px;
max-width:900px;
}

.admin-btn{
padding:20px;
font-size:17px;
border:none;
border-radius:10px;
cursor:pointer;
background:#1D1D1B;
color:white;
transition:all .2s ease;
}

.admin-btn:hover{
transform:translateY(-2px);
opacity:0.9;
}

#modalOverlay{
position:fixed;
inset:0;
background:rgba(0,0,0,0.45);
display:none;
justify-content:center;
align-items:center;
padding:15px;
}

.modal{
background:white;
width:95%;
max-width:1000px;
max-height:75vh;
border-radius:14px;
padding:20px;
overflow-y:auto;
position:relative;
box-sizing:border-box;
}

.close{
position:sticky;
top:0;
float:right;
font-size:28px;
cursor:pointer;
border:none;
background:white;
z-index:5;
padding:5px 10px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
font-size:16px;
}

th{
background:#eee;
padding:12px;
text-align:left;
font-size:16px;
}

td{
padding:12px;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f7f7f7;
}

input{
padding:12px;
margin-bottom:12px;
width:100%;
box-sizing:border-box;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
}

button.save{
background:#198754;
color:white;
border:none;
padding:12px 16px;
border-radius:6px;
cursor:pointer;
font-size:16px;
}

.filter-row{
display:flex;
gap:12px;
flex-wrap:wrap;
align-items:flex-end;
margin-bottom:12px;
}

.filter-group{
display:flex;
flex-direction:column;
min-width:160px;
}

.filter-group label{
font-size:13px;
margin-bottom:3px;
font-weight:600;
color:#777;
}

.filter-row input,
.filter-row select{
height:44px;
padding:0 10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
box-sizing:border-box;
min-width:160px;
}

/* Datumsgruppe */

.date-group{
display:flex;
gap:10px;
}

/* Preset Filter */

.preset-filters{
display:flex;
gap:8px;
margin-bottom:10px;
flex-wrap:wrap;
}

.preset-btn{
background:#e9ecef;
border:none;
padding:8px 14px;
border-radius:6px;
font-size:14px;
cursor:pointer;
}

.preset-btn:hover{
background:#dee2e6;
}

/* Mitglied Dropdown Suche */

/* Autocomplete Mitglied */

.member-autocomplete{
position:relative;
}

.member-autocomplete input{
height:44px;
padding:0 10px;
font-size:16px;
border-radius:6px;
border:1px solid #ccc;
width:200px;
}

.autocomplete-list{
position:absolute;
top:46px;
left:0;
right:0;
background:white;
border:1px solid #ddd;
border-radius:6px;
max-height:200px;
overflow-y:auto;
z-index:10;
}

.autocomplete-item{
padding:8px 10px;
cursor:pointer;
}

.autocomplete-item:hover{
background:#f1f3f5;
}
/* Mobile Optimierung */
@media (max-width:600px){

.filter-row{
flex-direction:column;
align-items:stretch;
}

.filter-btn{
width:100%;
}

}

.stat-box{
background:#f1f3f5;
padding:16px;
border-radius:8px;
margin-top:10px;
font-size:18px;
font-weight:600;
}

label{
display:block;
margin-top:10px;
margin-bottom:4px;
font-weight:600;
}

</style>

</head>

<body>

<h1>Admin Bereich</h1>

<div class="admin-buttons">

<button class="admin-btn" onclick="openMembers()">
Neues Mitglied
</button>

<button class="admin-btn" onclick="showMemberList()">
Mitgliederliste
</button>

<button class="admin-btn" onclick="openOpenPosts()">
Offene Posten
</button>

<button class="admin-btn" onclick="openEntnahmen()">
Entnahmen Übersicht
</button>

<button class="admin-btn" onclick="productStats()">
Produkt Statistik
</button>

<button class="admin-btn" onclick="memberRanking()">
Mitglieder Ranking
</button>

</div>


<div id="modalOverlay">
<div class="modal">

<button class="close" onclick="closeModal()">×</button>

<div id="modalContent"></div>

</div>
</div>


<script>

const SUPABASE_URL="https://lzrbcphditfrgvfoswpr.supabase.co"
const SUPABASE_KEY="sb_publishable_-C9ojxpR5NcQfi2NiEii5w_wi5rVblM"

let members=[]
let products=[]
let entnahmen=[]

async function fetchData(table){

const res=await fetch(SUPABASE_URL+"/rest/v1/"+table+"?select=*",{

headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY
}

})

return await res.json()

}

async function loadData(){

members=await fetchData("mitglieder")
products=await fetchData("produkte")
entnahmen=await fetchData("entnahmen")

}

loadData()


function openModal(html){

document.getElementById("modalContent").innerHTML=html
document.getElementById("modalOverlay").style.display="flex"

}

function closeModal(){

document.getElementById("modalOverlay").style.display="none"

}

 // ESC schließt Modal
document.addEventListener("keydown",(e)=>{
if(e.key==="Escape"){
closeModal()
}
})

// Klick außerhalb Modal schließen
document.getElementById("modalOverlay").addEventListener("click",(e)=>{

if(e.target.id==="modalOverlay"){
closeModal()
}

}) 

function formatDate(date){

if(!date) return ""

const d = new Date(date)

const day = String(d.getDate()).padStart(2,"0")
const month = String(d.getMonth()+1).padStart(2,"0")
const year = d.getFullYear()

return day+"."+month+"."+year

}

function productName(id){

const p=products.find(p=>p.id==id)
return p?p.name:"-"

}

function memberName(id){

const m=members.find(m=>m.id==id)
return m?m.name:"-"

}



function openMembers(){

openModal(`

<h2>Neues Mitglied</h2>

<input id="name" placeholder="Name">

<input id="telefon" placeholder="Telefon">

<input id="email" placeholder="Email">

<button class="save" onclick="saveMember()">Mitglied speichern</button>

`)

}

async function saveMember(){

const name=document.getElementById("name").value
const telefon=document.getElementById("telefon").value
const email=document.getElementById("email").value

await fetch(SUPABASE_URL+"/rest/v1/mitglieder",{

method:"POST",

headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({
name:name,
telefon:telefon,
email:email
})

})

alert("Mitglied gespeichert")

await loadData()

closeModal()

}



function showMemberList(){

let html=`

<h2>Mitglieder</h2>

<input id="memberSearch" placeholder="Mitglied suchen..." oninput="renderMemberList()">

<div id="memberTable"></div>

`

openModal(html)

renderMemberList()

}


function renderMemberList(){

const search=(document.getElementById("memberSearch").value || "").toLowerCase()

let filtered=members.filter(m=>m.name.toLowerCase().includes(search))

let html="<table>"

html+="<tr><th>Name</th><th>Telefon</th><th>Email</th><th></th></tr>"

filtered.forEach(m=>{

html+=`

<tr>

<td>${m.name}</td>

<td>${m.telefon||""}</td>

<td>${m.email||""}</td>

<td>

<button onclick="editMember('${m.id}')">Bearbeiten</button>

</td>

</tr>

`

})

html+="</table>"

document.getElementById("memberTable").innerHTML=html

}


function editMember(id){

const m=members.find(x=>x.id==id)

openModal(`

<h2>Mitglied bearbeiten</h2>

<label>Name</label>
<input id="editName" value="${m.name||""}">

<label>Telefon</label>
<input id="editTelefon" value="${m.telefon||""}">

<label>Email</label>
<input id="editEmail" value="${m.email||""}">
<button class="save" onclick="saveMemberEdit('${id}')">Speichern</button>

`)

}


async function saveMemberEdit(id){

const name=document.getElementById("editName").value
const telefon=document.getElementById("editTelefon").value
const email=document.getElementById("editEmail").value

await fetch(SUPABASE_URL+"/rest/v1/mitglieder?id=eq."+id,{

method:"PATCH",

headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({
name:name,
telefon:telefon,
email:email
})

})

await loadData()

alert("Mitglied aktualisiert")

closeModal()

}



function openOpenPosts(){

const open=entnahmen.filter(e=>!e.rechnung_id)

const sums={}

open.forEach(e=>{

if(!sums[e.mitglied_id])sums[e.mitglied_id]=0

sums[e.mitglied_id]+=Number(e.gesamtpreis||0)

})

const rows=Object.entries(sums).sort((a,b)=>b[1]-a[1])

let html="<h2>Offene Posten</h2>"

html+="<table><tr><th>Mitglied</th><th>Offen €</th></tr>"

rows.forEach(r=>{

html+=`

<tr onclick="showMemberOpen('${r[0]}')" style="cursor:pointer">

<td>${memberName(r[0])}</td>

<td>${r[1].toFixed(2)} €</td>

</tr>

`

})

html+="</table>"

openModal(html)

}



function showMemberOpen(memberId){

const open=entnahmen.filter(e=>e.mitglied_id==memberId && !e.rechnung_id)

let html=`<h2>Offene Posten - ${memberName(memberId)}</h2>`

html+="<table><tr><th>Datum</th><th>Produkt</th><th>Menge</th><th>€</th></tr>"

open.forEach(e=>{

html+=`

<tr>

<td>${formatDate(e.zeitpunkt)}</td>

<td>${productName(e.produkt_id)}</td>

<td>${e.menge}</td>

<td>${Number(e.gesamtpreis).toFixed(2)}</td>

</tr>

`

})

html+="</table>"

openModal(html)

}



function openEntnahmen(){

let memberOptions='<option value="all">Alle Mitglieder</option>'

members.forEach(m=>{
memberOptions+=`<option value="${m.id}">${m.name}</option>`
})

openModal(`

<h2>Entnahmen Übersicht</h2>

<div class="filter-row">

<div class="filter-group">
<label>Zeitraum</label>
<div class="date-group">
<input type="date" id="from" onchange="loadEntnahmen()">
<input type="date" id="to" onchange="loadEntnahmen()">
</div>
</div>

<div class="filter-group">
<label>Mitglied</label>

<div class="member-autocomplete">

<input
id="memberSearch"
placeholder="Mitglied suchen..."
oninput="autocompleteMember(this.value)"
autocomplete="off"
>

<div id="memberResults" class="autocomplete-list" style="display:none"></div>

</div>

<input type="hidden" id="memberFilter" value="all">

</div>

<div class="filter-group">
<label>Status</label>

<select id="paidFilter" onchange="loadEntnahmen()">
<option value="all">Alle</option>
<option value="paid">Bezahlt</option>
<option value="open">Offen</option>
</select>

</div>

</div><div class="preset-filters">

<button class="preset-btn" onclick="presetHeute()">Heute</button>

<button class="preset-btn" onclick="preset7Tage()">7 Tage</button>

<button class="preset-btn" onclick="presetDiesesMonat()">Dieser Monat</button>

<button class="preset-btn" onclick="presetLetztesMonat()">Letzter Monat</button>

</div>

<div id="entnahmenTable"></div>

<div id="entnahmenSumme" class="stat-box"></div>

`)

loadEntnahmen()

}


function loadEntnahmen(){

const from=document.getElementById("from").value
const to=document.getElementById("to").value
const member=document.getElementById("memberFilter").value
const status=document.getElementById("paidFilter").value

let filtered=[...entnahmen]

if(from){
filtered=filtered.filter(e=>e.zeitpunkt>=from)
}

if(to){
filtered=filtered.filter(e=>e.zeitpunkt<=to+"T23:59:59")
}

if(member!="all"){
filtered=filtered.filter(e=>e.mitglied_id==member)
}

if(status=="paid"){
filtered=filtered.filter(e=>e.rechnung_id)
}

if(status=="open"){
filtered=filtered.filter(e=>!e.rechnung_id)
}

filtered.sort((a,b)=>new Date(b.zeitpunkt)-new Date(a.zeitpunkt))

let sum=0

let html="<table>"
html+="<tr><th>Datum</th><th>Mitglied</th><th>Produkt</th><th>Menge</th><th>€</th><th>Bezahlt am</th></tr>"

filtered.forEach(e=>{

sum+=Number(e.gesamtpreis||0)

html+=`

<tr>

<td>${formatDate(e.zeitpunkt)}</td>

<td>${memberName(e.mitglied_id)}</td>

<td>${productName(e.produkt_id)}</td>

<td>${e.menge}</td>

<td>${Number(e.gesamtpreis).toFixed(2)}</td>

<td>${e.bezahlt_am ? formatDate(e.bezahlt_am) : "-"}</td>

</tr>

`

})

html+="</table>"

document.getElementById("entnahmenTable").innerHTML=html

document.getElementById("entnahmenSumme").innerHTML="Summe: "+sum.toFixed(2)+" €"

}
function presetHeute(){

const today=new Date().toISOString().split("T")[0]

document.getElementById("from").value=today
document.getElementById("to").value=today

loadEntnahmen()

}

function preset7Tage(){

const d=new Date()
const to=d.toISOString().split("T")[0]

d.setDate(d.getDate()-7)

const from=d.toISOString().split("T")[0]

document.getElementById("from").value=from
document.getElementById("to").value=to

loadEntnahmen()

}

function presetDiesesMonat(){

const d=new Date()

const first=new Date(d.getFullYear(),d.getMonth(),1)
const last=new Date(d.getFullYear(),d.getMonth()+1,0)

document.getElementById("from").value=first.toISOString().split("T")[0]
document.getElementById("to").value=last.toISOString().split("T")[0]

loadEntnahmen()

}

function presetLetztesMonat(){

const d=new Date()

const first=new Date(d.getFullYear(),d.getMonth()-1,1)
const last=new Date(d.getFullYear(),d.getMonth(),0)

document.getElementById("from").value=first.toISOString().split("T")[0]
document.getElementById("to").value=last.toISOString().split("T")[0]

loadEntnahmen()

}

function openRevenue(){

openModal(`

<h2>Umsatz Übersicht</h2>

<div class="filter-row">

<input type="date" id="from">

<input type="date" id="to">

<button onclick="calcRevenue()">Berechnen</button>

</div>

<div id="revenueResult"></div>

`)

}



function calcRevenue(){

const from=document.getElementById("from").value
const to=document.getElementById("to").value

let filtered=entnahmen

if(from){

filtered=filtered.filter(e=>formatDate(e.zeitpunkt)>=from)

}

if(to){

filtered=filtered.filter(e=>formatDate(e.zeitpunkt)<=to)

}

let total=0

filtered.forEach(e=>{

total+=Number(e.gesamtpreis||0)

})

document.getElementById("revenueResult").innerHTML=`

<div class="stat-box">

Gesamtumsatz: ${total.toFixed(2)} €

</div>

`

}



function productStats(){

openModal(`

<h2>Produkt Statistik</h2>

<div class="filter-row">

<div class="filter-group">
<label>Datum von</label>
<input type="date" id="from">
</div>

<div class="filter-group">
<label>Datum bis</label>
<input type="date" id="to">
</div>

<button class="filter-btn" onclick="calcProductStats()">Filtern</button>

</div>

<div id="productStatsTable"></div>

<div id="productStatsTotal" class="stat-box"></div>

`)

calcProductStats()

}


function calcProductStats(){

const from=document.getElementById("from").value
const to=document.getElementById("to").value

let filtered=entnahmen

if(from){
filtered=filtered.filter(e=>formatDate(e.zeitpunkt)>=from)
}

if(to){
filtered=filtered.filter(e=>formatDate(e.zeitpunkt)<=to)
}

const stats={}

filtered.forEach(e=>{

if(!stats[e.produkt_id]){

stats[e.produkt_id]={qty:0,umsatz:0}

}

stats[e.produkt_id].qty+=Number(e.menge)

stats[e.produkt_id].umsatz+=Number(e.gesamtpreis)

})

const rows=Object.entries(stats).sort((a,b)=>b[1].qty-a[1].qty)

let total=0

let html="<table>"

html+="<tr><th>Produkt</th><th>Menge</th><th>Umsatz</th></tr>"

rows.forEach(r=>{

total+=r[1].umsatz

html+=`

<tr>

<td>${productName(r[0])}</td>

<td>${r[1].qty}</td>

<td>${r[1].umsatz.toFixed(2)} €</td>

</tr>

`

})

html+="</table>"

document.getElementById("productStatsTable").innerHTML=html

document.getElementById("productStatsTotal").innerHTML="Gesamtumsatz: "+total.toFixed(2)+" €"

}



function memberRanking(){

const stats={}

entnahmen.forEach(e=>{

if(!stats[e.mitglied_id]){

stats[e.mitglied_id]=0

}

stats[e.mitglied_id]+=Number(e.gesamtpreis)

})

const rows=Object.entries(stats).sort((a,b)=>b[1]-a[1])

let html="<h2>Mitglieder Ranking</h2>"

html+="<table><tr><th>Mitglied</th><th>Umsatz</th></tr>"

rows.forEach(r=>{

html+=`

<tr>

<td>${memberName(r[0])}</td>

<td>${r[1].toFixed(2)} €</td>

</tr>

`

})

html+="</table>"

openModal(html)

}

function autocompleteMember(search){

const list=document.getElementById("memberResults")

if(!search){
list.style.display="none"
document.getElementById("memberFilter").value="all"
loadEntnahmen()
return
}

search=search.toLowerCase()

const results=members.filter(m=>
m.name.toLowerCase().includes(search)
)

let html=""

results.forEach(m=>{

html+=`
<div class="autocomplete-item"
onclick="selectMember('${m.id}','${m.name}')">
${m.name}
</div>
`

})

list.innerHTML=html
list.style.display="block"

}

function selectMember(id,name){

document.getElementById("memberSearch").value=name
document.getElementById("memberFilter").value=id

document.getElementById("memberResults").style.display="none"

loadEntnahmen()

}
</script>

</body>
</html>
