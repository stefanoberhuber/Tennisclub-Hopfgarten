async function fetchData(table){

headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY
}

})

}

function formatDate(date){

if(!date) return ""

const d = new Date(date)

const day = String(d.getDate()).padStart(2,"0")
const month = String(d.getMonth()+1).padStart(2,"0")
const year = d.getFullYear()

return day+"."+month+"."+year

}

function productName(id){

const p=products.find(p=>p.id==id)
return p?p.name:"-"

}

function memberName(id){

const m=members.find(m=>m.id==id)
return m?m.name:"-"

}

function bezahltDatum(rechnung_id){

if(!rechnung_id) return "-"

const r=rechnungen.find(x=>x.id==rechnung_id)

if(!r) return "-"

return formatDate(r.datum)

}

async function saveMember(){

const email=document.getElementById("email").value

await fetch(SUPABASE_URL+"/rest/v1/mitglieder",{

"Content-Type":"application/json"

telefon:telefon,

})

function renderMemberList(){

const search=(document.getElementById("memberSearch").value || "").toLowerCase()

let filtered=members.filter(m=>m.name.toLowerCase().includes(search))

let html="<table>"

html+="<tr><th>Name</th><th>Mitgliedsart</th><th>Telefon</th><th>Email</th><th></th></tr>"

filtered.forEach(m=>{

const art = mitgliedsarten.find(a=>a.id==m.mitgliedsart_id)

html+=`

<tr>

<td>${m.name}</td>
<td>${art ? art.name : "-"}</td>
<td>${m.telefon||""}</td>
<td>${m.email||""}</td>

<td>
<button onclick="editMember('${m.id}')">Bearbeiten</button>
</td>

</tr>

`

})

html+="</table>"

document.getElementById("memberTable").innerHTML=html

}


function editMember(id){

const m=members.find(x=>x.id==id)

let artOptions=""

mitgliedsarten.forEach(a=>{
artOptions+=`<option value="${a.id}" ${m.mitgliedsart_id==a.id?"selected":""}>${a.name}</option>`
})

openModal(`

<h2>Mitglied bearbeiten</h2>

<label>Name</label>
<input id="editName" value="${m.name||""}">

<label>Telefon</label>
<input id="editTelefon" value="${m.telefon||""}">

<label>Email</label>
<input id="editEmail" value="${m.email||""}">

<label>Mitgliedsart</label>
<select id="editMitgliedsart">
${artOptions}
</select>

<button class="save" onclick="saveMemberEdit('${id}')">Speichern</button>

`)

"Content-Type":"application/json"

function openOpenPosts(){

const open=entnahmen.filter(e=>!e.rechnung_id)

const sums={}

open.forEach(e=>{

if(!sums[e.mitglied_id])sums[e.mitglied_id]=0

sums[e.mitglied_id]+=parseFloat(e.gesamtpreis) || 0

})

const rows=Object.entries(sums).sort((a,b)=>b[1]-a[1])

let total = 0

let html="<h2>Offene Posten</h2>"

html+="<table><tr><th>Mitglied</th><th>Offen €</th></tr>"

rows.forEach(r=>{

total += r[1]

html+=`

<tr onclick="showMemberOpen('${r[0]}')" style="cursor:pointer">

<td>${memberName(r[0])}</td>

<td>${r[1].toFixed(2)} €</td>

</tr>

`

})

html+="</table>"

<div class="stat-box">
Gesamt offene Posten: ${total.toFixed(2)} €
</div>
`

}

function loadEntnahmen(){

const from=document.getElementById("from").value
const to=document.getElementById("to").value
const member=document.getElementById("memberFilterEntnahmen").value
const status=document.getElementById("paidFilter").value

let filtered=[...entnahmen]

if(from){
filtered=filtered.filter(e=>e.zeitpunkt>=from)
}

if(to){
filtered=filtered.filter(e=>e.zeitpunkt<=to+"T23:59:59")
}

if(member!="all"){
filtered=filtered.filter(e=>e.mitglied_id==member)
}

if(status=="paid"){
filtered=filtered.filter(e=>e.rechnung_id)
}

if(status=="open"){
filtered=filtered.filter(e=>!e.rechnung_id)
}

filtered.sort((a,b)=>new Date(b.zeitpunkt)-new Date(a.zeitpunkt))

let sum=0

let html="<table>"
html+="<tr><th>Datum</th><th>Mitglied</th><th>Produkt</th><th>Menge</th><th>€</th><th>Bezahlt am</th><th></th></tr>"

filtered.forEach(e=>{

sum+=Number(e.gesamtpreis||0)

html+=`

<tr>

<td>${formatDate(e.zeitpunkt)}</td>

<td>${memberName(e.mitglied_id)}</td>

<td>${productName(e.produkt_id)}</td>

<td>${e.menge}</td>

<td>${Number(e.gesamtpreis).toFixed(2)}</td>

<td>${bezahltDatum(e.rechnung_id)}</td>

<td>
${e.rechnung_id ? `<button onclick="showRechnung('${e.rechnung_id}')">Rechnung</button>` : ""}
</td>

</tr>

`

})

html+="</table>"

document.getElementById("entnahmenTable").innerHTML=html

document.getElementById("entnahmenSumme").innerHTML="Summe: "+sum.toFixed(2)+" €"

}

function calcProductStats(){

const from=document.getElementById("from").value
const to=document.getElementById("to").value

let filtered=[...entnahmen]

if(from){
filtered=filtered.filter(e=>e.zeitpunkt>=from)
}

if(to){
filtered=filtered.filter(e=>e.zeitpunkt<=to+"T23:59:59")
}

const stats={}

filtered.forEach(e=>{

if(!stats[e.produkt_id]){

stats[e.produkt_id]={qty:0,umsatz:0}

}

stats[e.produkt_id].qty+=Number(e.menge)

stats[e.produkt_id].umsatz+=Number(e.gesamtpreis)

})

const rows=Object.entries(stats).sort((a,b)=>b[1].qty-a[1].qty)

let total=0

let html="<table>"

html+="<tr><th>Produkt</th><th>Menge</th><th>Umsatz</th></tr>"

rows.forEach(r=>{

total+=r[1].umsatz

html+=`

<tr>

<td>${productName(r[0])}</td>

<td>${r[1].qty}</td>

<td>${r[1].umsatz.toFixed(2)} €</td>

</tr>

`

})

html+="</table>"

document.getElementById("productStatsTable").innerHTML=html

document.getElementById("productStatsTotal").innerHTML="Gesamtumsatz: "+total.toFixed(2)+" €"

}

 async function markBeitragBezahlt(id){

const today=new Date().toISOString().split("T")[0]

await fetch(SUPABASE_URL+"/rest/v1/mitgliedsbeitraege?id=eq."+id,{

method:"PATCH",

headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY,
"Content-Type":"application/json"
},

body:JSON.stringify({
status:"bezahlt",
bezahlt_am:today
})

})

alert("Beitrag als bezahlt markiert")

await loadData()

loadBeitraege()

}
async function generateBeitraege(){

await loadData()   // WICHTIG

const jahr = new Date().getFullYear()

let created = 0
let skipped = 0

for(const m of members){

const art = mitgliedsarten.find(a=>a.id==m.mitgliedsart_id)

if(!art){
skipped++
continue
}

if(art.beitrag==0){
skipped++
continue
}

const exist = mitgliedsbeitraege.find(b=>
b.mitglied_id==m.id && b.jahr==jahr
)

if(exist){
skipped++
continue
}

await fetch(SUPABASE_URL+"/rest/v1/mitgliedsbeitraege",{
method:"POST",
headers:{
apikey:SUPABASE_KEY,
Authorization:"Bearer "+SUPABASE_KEY,
"Content-Type":"application/json"
},
body:JSON.stringify({
mitglied_id:m.id,
mitgliedsart_id:art.id,
jahr:jahr,
betrag:art.beitrag,
status:"offen"
})
})

created++

}

alert(created+" Beiträge erstellt\n"+skipped+" übersprungen")

await loadData()
loadBeitraege()


}

function editBeitrag(id){
    const b = mitgliedsbeitraege.find(x=>x.id==id)
    openModal(`
        <h2>Beitrag bearbeiten</h2>

        <label>Status</label>
        <select id="beitragStatus" onchange="toggleBezahltDatum()">
            <option value="offen" ${b.status=="offen"?"selected":""}>Offen</option>
            <option value="bezahlt" ${b.status=="bezahlt"?"selected":""}>Bezahlt</option>
            <option value="storniert" ${b.status=="storniert"?"selected":""}>Storniert</option>
            <option value="erlassen" ${b.status=="erlassen"?"selected":""}>Erlassen</option>
        </select>

        <div id="bezahltDatumGroup" style="display:${b.status=="bezahlt"?"block":"none"}">
            <label>Bezahlt am</label>
            <input type="date" id="bezahltAm" value="${b.bezahlt_am||''}">
        </div>

        <button class="save" onclick="saveBeitrag('${id}')">Speichern</button>
    `)
}

// Neue Funktion, die das Datumsfeld ein-/ausblendet
function toggleBezahltDatum(){
    const status = document.getElementById("beitragStatus").value
    const div = document.getElementById("bezahltDatumGroup")
    div.style.display = status === "bezahlt" ? "block" : "none"
}

async function saveBeitrag(id){
    const status = document.getElementById("beitragStatus").value
    const bezahltAm = document.getElementById("bezahltAm").value

    let data = { status: status }

    if(status == "bezahlt"){
        data.bezahlt_am = bezahltAm
    } else {
        data.bezahlt_am = null
    }

    // Update Beitrag
    await fetch(SUPABASE_URL+"/rest/v1/mitgliedsbeitraege?id=eq."+id,{
        method:"PATCH",
        headers:{
            apikey:SUPABASE_KEY,
            Authorization:"Bearer "+SUPABASE_KEY,
            "Content-Type":"application/json"
        },
        body:JSON.stringify(data)
    })

    // Beitrag neu laden
    await loadData()

    // Prüfen, ob Rechnung schon existiert
    const beitrag = mitgliedsbeitraege.find(b => b.id == id)
    const existierendeRechnung = rechnungen.find(r => r.typ=="mitgliedsbeitrag" && r.mitglied_id == beitrag.mitglied_id && r.datum == bezahltAm)

    if(status=="bezahlt" && !existierendeRechnung){
        // Rechnung erstellen
        await fetch(SUPABASE_URL+"/rest/v1/rechnungen",{
            method:"POST",
            headers:{
                apikey:SUPABASE_KEY,
                Authorization:"Bearer "+SUPABASE_KEY,
                "Content-Type":"application/json"
            },
            body:JSON.stringify({
                datum: bezahltAm,
                typ: "mitgliedsbeitrag",
                mitglied_id: beitrag.mitglied_id
            })
        })
    }

    alert("Beitrag aktualisiert")
    closeModal()
    loadBeitraege()
}

 function openBeitraegeDashboard() {
    const jahr = new Date().getFullYear();
    
    // Kategorien aus Mitgliedsarten inkl. "Unbekannt" für Null
    const categories = [...mitgliedsarten.map(a => ({id: a.id, name: a.name})), {id: null, name: "Unbekannt"}];

    let html = `<h2>Dashboard Mitgliedsbeiträge ${jahr}</h2>
                <table>
                <tr><th>Mitgliedsart</th><th>Bezahlt</th><th>Offen</th><th>Gesamt</th></tr>`;

    categories.forEach(cat => {
        const filteredMembers = members.filter(m => m.mitgliedsart_id === cat.id);
        const total = filteredMembers.length;
        const bezahlt = mitgliedsbeitraege.filter(b => b.jahr == jahr && b.status === "bezahlt" && filteredMembers.some(m => m.id === b.mitglied_id)).length;
        const offen = mitgliedsbeitraege.filter(b => b.jahr == jahr && b.status === "offen" && filteredMembers.some(m => m.id === b.mitglied_id)).length;

        html += `<tr>
                    <td>${cat.name}</td>
                    <td style="cursor:pointer; color:blue;" onclick="filterBeitraegeByCategory('${cat.id}','bezahlt')">${bezahlt}</td>
                    <td style="cursor:pointer; color:blue;" onclick="filterBeitraegeByCategory('${cat.id}','offen')">${offen}</td>
                    <td>${total}</td>
                 </tr>`;
    });

    html += `</table>`;

    openModal(html);
}

 function filterBeitraegeByCategory(catId, status) {
    const jahr = new Date().getFullYear();

    let filteredMembers = members.filter(m => m.mitgliedsart_id == catId || (catId === "null" && !m.mitgliedsart_id));
    let filteredIds = filteredMembers.map(m => m.id);

    let filteredBeitraege = mitgliedsbeitraege.filter(b => 
        b.jahr == jahr &&
        b.status == status &&
        filteredIds.includes(b.mitglied_id)
    );

    let html = `<h2>Mitgliederliste - ${status} Beiträge</h2>
                <table>
                <tr><th>Mitglied</th><th>Beitrag</th><th>Status</th><th></th></tr>`;

    filteredBeitraege.forEach(b => {
        const m = members.find(mem => mem.id == b.mitglied_id);
        html += `<tr>
                    <td>${m ? m.name : "-"}</td>
                    <td>${Number(b.betrag).toFixed(2)} €</td>
                    <td>${b.status}</td>
                    <td><button onclick="editBeitrag('${b.id}')">Bearbeiten</button></td>
                 </tr>`;
    });

    html += `</table>`;

    openModal(html);
}
